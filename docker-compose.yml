services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roomy
      POSTGRES_USER: roomy
      POSTGRES_PASSWORD: roomy_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomy -d roomy"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Roomy.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Roomy: Host=postgres;Port=5432;Database=roomy;Username=roomy;Password=roomy_dev
    ports:
      - "5023:8080"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: frontend
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  pgdata:
