services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: roomy
      POSTGRES_USER: roomy
      POSTGRES_PASSWORD: roomy_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roomy -d roomy"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
